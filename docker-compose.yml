version: "3.9"

services:
  gateway:
    build: ./gateway
    container_name: educlaw-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    depends_on:
      - skills-runtime
    networks:
      - educlaw-internal

  skills-runtime:
    build: ./skills-runtime
    container_name: educlaw-skills
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "8001:8001"
    networks:
      - educlaw-internal

  # Optional: Local LLM fallback (DO NOT USE on machines without dedicated GPU)
  # To start: docker compose --profile local-llm up -d
  ollama:
    image: ollama/ollama:latest
    container_name: educlaw-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    profiles:
      - local-llm
    networks:
      - educlaw-internal

volumes:
  ollama-models:

networks:
  educlaw-internal:
    driver: bridge
